<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - FairRide</title>
    <link rel="icon" type="image/png" href="logo.png"/>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#6c7b6d",
                        "surface-variant": "#e1e3e4",
                        "surface-container": "#edeeef",
                        "on-secondary": "#ffffff",
                        "on-surface": "#191c1d",
                        "background": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "secondary": "#006397",
                        "on-primary-fixed-variant": "#005228",
                        "on-secondary-container": "#00476e",
                        "surface-container-high": "#e7e8e9",
                        "inverse-primary": "#4ae183",
                        "tertiary": "#98472a",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#4ae183",
                        "primary-fixed": "#6bfe9c",
                        "on-primary-container": "#005027",
                        "surface-container-low": "#f3f4f5",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-tint": "#006d37",
                        "primary-container": "#2ecc71",
                        "outline-variant": "#bbcbbb",
                        "surface": "#f8f9fa",
                        "primary": "#006d37",
                        "on-surface-variant": "#3d4a3e",
                        "inverse-surface": "#2e3132",
                        "surface-container-highest": "#e1e3e4",
                        "error-container": "#ffdad6",
                        "on-background": "#191c1d",
                        "surface-dim": "#d9dadb",
                        "surface-bright": "#f8f9fa",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Decorative Elements -->
    <div class="absolute -top-24 -right-24 w-96 h-96 bg-primary-container/20 rounded-full blur-[80px]"></div>
    <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-secondary-container/10 rounded-full blur-[80px]"></div>

    <main class="w-full max-w-md px-6 py-12 relative z-10">
        <header class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container text-on-primary-container rounded-xl mb-6 shadow-[0px_12px_32px_rgba(0,109,55,0.1)]">
                <img src="logo.png" alt="FairRide Logo" class="w-12 h-12 object-contain" />
            </div>
            <h1 class="font-headline font-extrabold text-4xl text-primary tracking-tighter mb-2">FairRide</h1>
            <p class="text-on-surface-variant font-medium tracking-tight">Trusted Journeys. Just Pricing.</p>
        </header>

        <section class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_12px_32px_rgba(25,28,29,0.04)]">
            <form class="space-y-6" id="login-form">
                <div class="space-y-2">
                    <label class="block font-label text-[11px] uppercase tracking-[0.08em] font-bold text-on-surface-variant ml-2" for="email">Email Address</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant">
                            <span class="material-symbols-outlined text-lg">mail</span>
                        </div>
                        <input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline-variant text-on-surface" id="email" name="email" placeholder="name@example.com" type="email" required/>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-end px-2">
                        <label class="block font-label text-[11px] uppercase tracking-[0.08em] font-bold text-on-surface-variant" for="password">Password</label>
                        <a class="text-primary text-[11px] font-bold uppercase tracking-wider hover:opacity-70 transition-opacity" href="#">Forgot?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant">
                            <span class="material-symbols-outlined text-lg">lock</span>
                        </div>
                        <input class="w-full h-14 pl-12 pr-12 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline-variant text-on-surface" id="password" name="password" placeholder="••••••••" type="password" required/>
                        <button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant hover:text-primary transition-colors" id="toggle-password" type="button">
                            <span class="material-symbols-outlined text-lg">visibility</span>
                        </button>
                    </div>
                </div>

                <p class="hidden text-sm font-semibold text-error" id="login-error"></p>

                <button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold rounded-xl shadow-[0px_8px_24px_rgba(0,109,55,0.2)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2" id="login-submit" type="submit">
                    <span>Sign In</span>
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
                </button>
            </form>

            <div class="relative my-10 text-center">
                <div aria-hidden="true" class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-surface-variant"></div>
                </div>
                <span class="relative px-4 bg-surface-container-lowest text-[11px] font-bold uppercase tracking-widest text-outline">Or continue with</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-2 h-14 bg-surface-container-low rounded-lg hover:bg-surface-container-high transition-colors group" data-social-login="google" type="button">
                    <img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBg6X7dpXZFDbqXNG4eKEcngYGYq2s2YKM9C2w6oQMF4TPoQzx5g1SrhTZDdAv7xfTlW5-KB5XsTOIOcQpBE9W4Pcup1b-g1De5s6bkwPzwdEdxQLgM5mE0_y4ZBEXYalNYGmssIeEQkfuN16z4qoCmOYP-q1zJM_Xwy6L26xd8xOCvqpjsYIILWVLAVd_OweQzdbgn9hyskASpZET4pPhrAgMBQzZF0bqKU3wV7nnQEJiBL2BsM48F-u9RwhGnmla1g5Z2dvvvkPk"/>
                    <span class="text-sm font-semibold text-on-surface">Google</span>
                </button>
                <button class="flex items-center justify-center gap-2 h-14 bg-surface-container-low rounded-lg hover:bg-surface-container-high transition-colors group" data-social-login="guest" type="button">
                    <span class="material-symbols-outlined text-xl">person</span>
                    <span class="text-sm font-semibold text-on-surface">Guest</span>
                </button>
            </div>
        </section>

        <footer class="mt-10 text-center">
            <p class="text-on-surface-variant font-medium">New to FairRide? <a class="text-primary font-bold hover:underline" href="#">Create account</a></p>
        </footer>
    </main>

    <script>
        const AUTH_KEY = 'fr_auth';
        function goToApp() { window.location.replace('index.html'); }
        
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const passwordInput = document.getElementById('password');
            const togglePassword = document.getElementById('toggle-password');

            togglePassword.addEventListener('click', () => {
                const hidden = passwordInput.type === 'password';
                passwordInput.type = hidden ? 'text' : 'password';
                togglePassword.querySelector('span').textContent = hidden ? 'visibility_off' : 'visibility';
            });

            form.addEventListener('submit', e => {
                e.preventDefault();
                localStorage.setItem(AUTH_KEY, JSON.stringify({ email: document.getElementById('email').value, loggedInAt: Date.now() }));
                goToApp();
            });

            document.querySelectorAll('[data-social-login]').forEach(btn => {
                btn.addEventListener('click', () => {
                    localStorage.setItem(AUTH_KEY, JSON.stringify({ email: 'user@example.com', loggedInAt: Date.now() }));
                    goToApp();
                });
            });
        });
    </script>
</body>
</html>
